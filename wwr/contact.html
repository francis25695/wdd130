<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Centre for Inclusive Development</title>
    <meta name="description"
      content="Get in touch with Centre for Inclusive Development (CID) Reach out for general inquiries, reservations, or to subscribe to our monthly newsletter.">
    <meta name="author" content="Francis Mwaka">
</head>

<body>
    <header>
        <img src="images/cen-logo.png" alt="CEN logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>


    <main>
        <!-- contact info and map -->
        <section class="contact-info">
            <div class="company-details">
                <h2>Find Us</h2>
                <address>
                    <p><strong>Address:</strong>Plot 00, Juba Road, Atiak, Amuru, Uganda</p>
                    <p><strong>Phone:</strong>+256 773 111 081</p>
                    <p><strong>Email:</strong><a
                          href="mailto:francismwaka99@gmail.com">francismwaka99@gmail.com</a></p>
                </address>
            </div>
            <div class="map-container">
                <iframe title="CID Office Location on Google Maps"
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3983.2577746125703!2d32.0884995!3d3.286174200000019!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1772256ddb5afab5%3A0x47c1e9c55683d5ad!2sKanalela%20Primary%20School!5e0!3m2!1sen!2sug!4v1781206068979!5m2!1sen!2sug"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>>
                </iframe>
            </div>

        </section>

        <section class="team">
            <h2>Meet Our Team</h2>
            <div class="team-figures">
                <figure>
                    <img src="images/francis.jpg" alt="Francis Mwaka. Executive Director">
                    <figcaption>Francis Mwaka <br> <span>Executive Director</span></figcaption>
                </figure>
                <figure>
                    <img src="images/edmond.jpg" alt="Programs Manager">
                    <figcaption>Ssebunya Edmond<br><span>Programs Manager</span></figcaption>
                </figure>
                <figure>
                    <img src="images/sam.jpg" alt="Community Liaison officer">
                    <figcaption>Kule Sam<br><span>Community Liaison officer</span></figcaption>
                </figure>
            </div>

        </section>
        <!-- contact form -->
        <section class="contact-form-section">
            <h2>Send Us a Message</h2>
            <div class="contact-form">
                <label for="user-name">Your Name</label>
                <input type="text" id="user-name" name="user-name"
                  placeholder="Enter Your Full Name" required>

                <label for="user-email">Your Email Address</label>
                <input type="email" id="user-email" name="user-email"
                  placeholder="Enter Your Email Address" required>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label class="radio-lebel">
                        <input type="radio" name="Purpose" value="general-inquiry" required>
                        General Inquiry
                    </label>
                    <label class="radio-lebel">
                        <input type="radio" name="Purpose" value="intervention-question">
                        Intervention Question
                    </label>
                    <label class="radio-lebel">
                        <input type="radio" name="Purpose" value="website-suggestion">
                        Website Suggestion
                    </label>
                </fieldset>

                <label for="user-message">Your Message</label>
                <textarea name="user-message" id="user-message" rows="6"
                  placeholder="Type your message here..." required></textarea>
                <label class="check-box-label">
                    <input type="checkbox" name="newsletter" value="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>
                <button type="submit" class="submit-btn">Submit Message</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy;2026 | Centre for Inclusive Development (CID) | Francis Mwaka</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a
              href="https://www.linkedin.com/public-profile/settings?lipi=urn%3Ali%3Apage%3Ad_flagship3_profile_self_edit_contact-info%3BIuj2T2uFQ%2BWbgWFhDwN6%2BQ%3D%3D">
                <img src="images/linkedin.png" alt="LinkedIn Icon">
            </a>
            <a href="https://x.com/francismwaka99">
                <img src="images/twitter.png" alt="twitter Icon">
            </a>
        </nav>

    </footer>

</body>

</html>
